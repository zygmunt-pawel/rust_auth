# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/
#
# Run locally:
#   cargo install --locked cargo-deny
#   cargo deny check
#
# CI runs the same via .github/workflows/audit.yml on every PR + 6h cron.

[graph]
# Build the dep graph for all features (`google` provider pulls reqwest +
# jsonwebtoken). If we ever cross-compile (we don't today), add targets here.
all-features = true

[output]
feature-depth = 1

# ------------------------------------------------------------------- #
# Advisories — RustSec database (https://rustsec.org)                  #
# ------------------------------------------------------------------- #
[advisories]
version = 2
ignore = [
    # Marvin Attack timing sidechannel on `rsa` 0.9.x. Pulled in transitively
    # by `sqlx-mysql` (which our build excludes — sqlx default-features=false
    # + only the `postgres` feature) and by the dev-dep `rsa` 0.9.6 used in
    # `tests/google_verifier.rs` to mint JWTs for a wiremock JWKS. Never
    # compiled into the shipped library, and the dev usage signs locally so
    # the timing sidechannel is irrelevant. Upstream has no patched release
    # as of this writing — re-evaluate when `rsa` ships a constant-time fix.
    { id = "RUSTSEC-2023-0071", reason = "rsa 0.9.6 pulled transitively by sqlx-mysql (excluded at build time) and by dev-dep used to mint test JWTs; never shipped" },
]
yanked = "warn"

# ------------------------------------------------------------------- #
# Licenses — allow only OSI-approved permissive + MPL                  #
# ------------------------------------------------------------------- #
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "Zlib",
    "CC0-1.0",
    # `webpki-roots` (transitive via sqlx-tls / reqwest) ships the Mozilla CA
    # bundle under CDLA-Permissive-2.0. LF permissive open-data license, OSI-
    # permissive equivalent — safe to bundle.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
exceptions = []

# ------------------------------------------------------------------- #
# Bans — duplicates, wildcards, specific crates                        #
# ------------------------------------------------------------------- #
[bans]
multiple-versions = "warn"
# Cargo.toml uses exact `=` pins everywhere (see CLAUDE.md / pinned-deps CI
# job). Wildcards should never appear — hard-deny.
wildcards = "deny"
deny = []
allow = []
skip = []
skip-tree = []

# ------------------------------------------------------------------- #
# Sources — only crates.io (no git deps, no private registries)        #
# ------------------------------------------------------------------- #
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
