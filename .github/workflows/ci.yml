name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  doc:
    name: rustdoc
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `--no-deps` keeps the build fast; `RUSTDOCFLAGS=-D warnings` (env)
      # turns broken intra-doc links into CI failures.
      - run: cargo doc --no-deps --document-private-items --all-features

  pinned-deps:
    name: pinned-deps
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - name: Check all dependencies are pinned to exact versions
        run: |
          python3 -c "
          import tomllib, sys
          with open('Cargo.toml', 'rb') as f:
              cargo = tomllib.load(f)
          errors = []
          for section in ('dependencies', 'dev-dependencies'):
              deps = cargo.get(section, {})
              for name, spec in deps.items():
                  ver = spec if isinstance(spec, str) else spec.get('version', '')
                  if ver and not ver.startswith('='):
                      errors.append(f'  {section}.{name} = \"{ver}\" (should start with \"=\")')
          if errors:
              print('::error::Found unpinned dependencies in Cargo.toml:')
              print('\n'.join(errors))
              sys.exit(1)
          print('All dependencies are pinned to exact versions.')
          "

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      # `cargo check --all-targets --all-features` exercises lib + tests + the
      # `google` provider on the pinned MSRV from `package.rust-version`. The
      # full test suite is the `test` job's responsibility. `--locked` honours
      # the committed Cargo.lock (this repo tracks it).
      - run: cargo check --all-targets --all-features --locked

  test:
    name: test (PG18 via testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # ubuntu-latest GH runners ship Docker pre-installed; `testcontainers`
      # picks it up via the default DOCKER_HOST. Confirm the daemon is up
      # before launching ~30 integration suites.
      - name: Verify Docker is available
        run: docker version
      - name: Pre-pull PG18 image
        run: docker pull postgres:18-alpine
      # `--no-fail-fast` so a single flaky integration test doesn't mask
      # the rest. `--all-features` exercises the optional `google` provider.
      # RUST_LOG kept terse (warn-level) to keep CI logs scannable.
      - name: cargo test
        env:
          RUST_LOG: warn,sqlx=warn,auth_rust=warn
        run: cargo test --all-features --no-fail-fast --locked
